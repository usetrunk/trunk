services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trunk
      POSTGRES_PASSWORD: trunk
      POSTGRES_DB: trunk
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trunk"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
